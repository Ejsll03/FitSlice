<div class="register-bg">
  <canvas id="register-canvas"></canvas>
  <div class="register-wrapper">
    <div class="glass-panel">
      <div class="register-logo">
        <div class="logo-img-wrapper">
          <img src="/images/fitslice-logo.svg" alt="FitSlice Logo" class="logo-img" />
        </div>
        <h1 class="register-title">NEW_OPERATIVE</h1>
        <p class="register-subtitle">[ ESTABLISH_LINK ]</p>
      </div>

      <div class="register-form">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input class="input-ghost" type="text" id="name" placeholder="OPERATIVE_NAME" />
        </div>

        <div class="input-group">
          <span class="input-icon">✉</span>
          <input class="input-ghost" type="email" id="email" placeholder="OPERATIVE_ID" />
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input class="input-ghost" type="password" id="password" placeholder="ACCESS_CODE" />
        </div>

        <p id="error-msg" class="error-msg"></p>

        <button id="register-btn" class="kinetic-btn">
          <span class="kinetic-btn-content">
            <span>ESTABLISH_LINK</span>
            <span class="btn-arrow">→</span>
          </span>
        </button>
      </div>

      <div class="register-footer">
        <span class="footer-text">STATUS: REGISTERED?</span>
        <span id="login-link" class="establish-link">[ SYS_LOGIN ]</span>
      </div>
    </div>
  </div>
</div>
