<div class="chat-page">
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="back-link" id="back-to-dashboard">← Dashboard</span>
      <div class="chat-header-info">
        <span class="chat-ai-icon">💬</span>
        <div>
          <p class="chat-title">AI Coach</p>
          <p class="chat-subtitle">Personalized fitness assistant</p>
        </div>
      </div>
    </div>
    <span class="chat-status-badge">● Live</span>
  </div>

  <div id="messages" class="messages"></div>

  <div class="chat-composer">
    <textarea id="message-input" class="composer-input" placeholder="Ask about your plan, exercises, nutrition..." rows="1"></textarea>
    <button id="send-btn" class="send-btn">Send</button>
  </div>
</div>
